


<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Titre de la page</title>
  <link rel="stylesheet" href="style.css">
  <script src="js-yaml.min.js"></script>
  
  <script type="text/javascript">
  var doc = jsyaml.load('greeting: hello\nname: world');
  fetch("data.yaml")
    .then((res) => res.text())
    .then((text) => {
      const data = jsyaml.load(text);
      const idx = Math.floor(Math.random() * data.length);
      const question = data[idx];
      document.getElementById('q').innerText = question;
     })
    .catch((e) => alert(`Failed to load data file : ${e}`));
  </script>
  
  <link rel="stylesheet" href="https://eloi-menaud.github.io/specimen/style.css">
      
  <style>
    html{
        --front: blue !important;
    }
  body{
      height: 100dvh;
      div{
          position: absolute;
          top: 45%;
          left: 50%;
          transform: translate(-50%, -50%);
          display: flex;
          flex-direction: column;
          width: 60rem;
          max-width: 90%;
          h1{
              text-align: center;
              margin-bottom: 3rem;
              font-style: italic;
              font-family: "IBM Plex Mono", monospace;
              font-size: 1.5rem;
          }
          button{
              width: fit-content;
              margin: 0 auto;
          }
      }
      
      footer{
          position: absolute;
          bottom: 2rem;
          width: 100%;
          display: flex;
          a{
              margin: 0 auto;
          }
      }
      header{
          position: absolute;
          top: 2rem;
          width: 100%;
          display: flex;
          p{
              margin: 0 auto;
          }
      }
  }
  @media screen and (max-width: 600px) {
      html {
          font-size: 25px;
          width: 100%;
      }
      h1{
          font-size: 2.5rem;
      }
      
  }
  </style>
</head>
<body>
    <header>
        <p>yermark</p>
    </header>
    <div>    
        <h1 id="q"></h1>
        <button onclick="window.location.reload()">refresh ⟳</button>
    </div>
    <footer>
        <a href="https://github.com/eloi-menaud/yermak">source</a>
    </footer>
</body>
</html>
