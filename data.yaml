- If you could have any piece of art in your home, what would it be?
- If you could live inside the world of a specific painting for a day, which one would you choose?
- What is a "mundane" object that you find unexpectedly beautiful?
- If you had to design your "sanctuary" room, what would the aesthetic be and what would you keep in it?
- What is your favorite quality about yourself?
- How do you define happiness?
- If you could "pause time" for everyone except yourself for one hour a day, how would you spend that hour?
- If you could receive a letter from your future self 10 years from now, what is the one thing you’d hope it says?
- What is a "mystery" of life (big or small) that you find yourself thinking about often?
- What is your "comfort" meal the one thing you always want to eat when you’ve had a long day?
- If you could be an expert in any one subject by tomorrow morning, what would it be?
- What is the most "useless" piece of trivia you know that you think is actually fascinating?
- If you were to give a 10-minute presentation on something you’re obsessed with, what would it be?
- If you could have a one-on-one masterclass with any person, living or dead, who would it be?
- If you were given a blank space in a museum to create an exhibit about literally anything you want, what would we see when we walk in?
- What do you do to feel better?
- If you could have dinner with a celebrity, who would you choose?
- If money weren't an issue, what would you do with your life?
- What fear would you like to get rid of?
- Would you go live on Mars if there were a human colony?
- Is there a movie that touched you more than any other?
- What's the best advice you've ever received?
- What would you do if you knew you couldn't fail?
- Is there a song that feels like it was written about you?
- If you could be friends with a fictional character, who would you choose?
- If you could say one thing to every human on Earth, what would you say?
- If you could know the answer to one question about the universe, what would it be?
- What would you say if you could write a letter to yourself 10 years ago?
- What superpower would you want to have?
- When was the last time you failed? What did you learn from it?
